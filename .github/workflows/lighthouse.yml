name: Lighthouse

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday baseline against main preview

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ secrets.E2E_PREVIEW_URL }}/
            ${{ secrets.E2E_PREVIEW_URL }}/pricing
            ${{ secrets.E2E_PREVIEW_URL }}/templates
            ${{ secrets.E2E_PREVIEW_URL }}/login
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
